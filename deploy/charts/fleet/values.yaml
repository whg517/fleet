# Fleet Helm Chart — Default Values
# This file is intentionally documented for easy configuration.

replicaCount: 2

image:
  repository: fleet
  pullPolicy: IfNotPresent
  tag: latest

service:
  type: ClusterIP
  port: 8080

resources:
  limits:
    cpu: 500m
    memory: 512Mi
  requests:
    cpu: 250m
    memory: 256Mi

# ── Probes ──────────────────────────────────
livenessProbe:
  httpGet:
    path: /api/v1/health
    port: 8080
  initialDelaySeconds: 15
  periodSeconds: 20

readinessProbe:
  httpGet:
    path: /api/v1/health/ready
    port: 8080
  initialDelaySeconds: 5
  periodSeconds: 10

# ── Dependencies ────────────────────────────
postgresql:
  enabled: true
  # When using external PostgreSQL, set:
  # host: "external-pg.example.com"
  auth:
    username: fleet
    database: fleet
  primary:
    persistence:
      size: 20Gi

redis:
  enabled: true
  # When using external Redis, set:
  # addr: "external-redis.example.com:6379"

# ── Application Configuration ───────────────
config:
  database:
    host: ""
    port: 5432
    user: fleet
    name: fleet
    sslmode: disable
  redis:
    addr: ""
    db: 0
  log:
    level: info
    format: json

# ── Secrets (placeholder — override in production) ──
secrets:
  databasePassword: "changeme"
  redisPassword: ""
  oidcClientSecret: ""
  jwtSecret: ""

# ── Ingress ─────────────────────────────────
ingress:
  enabled: false
  className: ""
  annotations: {}
  hosts:
    - host: fleet.local
      paths:
        - path: /
          pathType: Prefix
  tls: []

# ── Autoscaling ─────────────────────────────
autoscaling:
  enabled: false
  minReplicas: 2
  maxReplicas: 10
  targetCPUUtilizationPercentage: 80
