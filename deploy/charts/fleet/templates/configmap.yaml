apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "fleet.fullname" . }}-config
  labels:
    {{- include "fleet.labels" . | nindent 4 }}
data:
  # Database (non-sensitive)
  DB_HOST: {{ .Values.config.database.host | quote }}
  DB_PORT: {{ .Values.config.database.port | quote }}
  DB_USER: {{ .Values.config.database.user | quote }}
  DB_NAME: {{ .Values.config.database.name | quote }}
  DB_SSLMODE: {{ .Values.config.database.sslmode | quote }}

  # Redis (non-sensitive)
  REDIS_ADDR: {{ .Values.config.redis.addr | quote }}
  REDIS_DB: {{ .Values.config.redis.db | quote }}

  # Logging
  LOG_LEVEL: {{ .Values.config.log.level | quote }}
  LOG_FORMAT: {{ .Values.config.log.format | quote }}
