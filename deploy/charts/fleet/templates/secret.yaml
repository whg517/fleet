apiVersion: v1
kind: Secret
metadata:
  name: {{ include "fleet.fullname" . }}-secret
  labels:
    {{- include "fleet.labels" . | nindent 4 }}
type: Opaque
stringData:
  DB_PASSWORD: {{ .Values.secrets.databasePassword | quote }}
  REDIS_PASSWORD: {{ .Values.secrets.redisPassword | quote }}
  OIDC_CLIENT_SECRET: {{ .Values.secrets.oidcClientSecret | quote }}
  JWT_SECRET: {{ .Values.secrets.jwtSecret | quote }}
